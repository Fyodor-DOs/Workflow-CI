name: ML CI Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train-model:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0 pandas numpy scikit-learn

    - name: Run MLflow Project
      run: |
        mlflow run MLProject --env-manager=local
      env:
        MLFLOW_TRACKING_URI: sqlite:///mlflow.db

    - name: Verify training completed
      run: |
        echo "Model training via mlflow run completed successfully!"
        echo "Listing MLflow artifacts..."
        ls -la mlflow.db || echo "MLflow DB created"
